<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lock In</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <select id="language_selector" class="language_selector" aria-label="Select language">
            <option value="en">English</option>
            <option value="vi">Tiếng Việt</option>
        </select>

        <div class="card">
            <h1>Lock In</h1>
            <p id="tagline" class="tagline">Canvas information hub — browse courses, weeks, and resources.</p>
            <nav class="app_nav" aria-label="App views">
                <button type="button" class="view_tab view_tab_active" data-view="work">Work</button>
                <button type="button" class="view_tab" data-view="timetable">Timetable</button>
            </nav>
        </div>

        <main id="work_view" class="app_view app_view_active">
        <div class="card hub_container">
            <div class="hub_header">
                <h2 id="hub_title">Browse</h2>

                <div class="input-wrapper">
                    <button type="button" class="icon" aria-label="Focus search">
                        <svg
                            width="25px"
                            height="25px"
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M11.5 21C16.7467 21 21 16.7467 21 11.5C21 6.25329 16.7467 2 11.5 2C6.25329 2 2 6.25329 2 11.5C2 16.7467 6.25329 21 11.5 21Z"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            ></path>
                            <path
                                d="M22 22L20 20"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            ></path>
                        </svg>
                    </button>
                    <input id="search_input" type="search" class="input" placeholder="Search items">
                </div>


                <label class="filter_toggle">
                    <input id="unfinished_only" type="checkbox">
                    <span>Unfinished</span>
                </label>
            </div>

            <div id="course_pills" class="course_pills"></div>

            <div id="item_list"></div>

            <div class="week_nav">
                <button id="prev_week" type="button" class="week_nav_btn" aria-label="Previous week">
                    ←
                </button>
                <span id="week_label" class="week_label">Week <input id="week_input" type="number" class="week_input_inline" placeholder="—" min="1" step="1"></span>
                <button id="next_week" type="button" class="week_nav_btn" aria-label="Next week">
                    →
                </button>
            </div>
        </main>

        <main id="timetable_view" class="app_view" hidden>
        <div class="card timetable_container">
            <div class="timetable_header">
            <div>
                <h2 id="timetable_title">Weekly Timetable</h2>
                <p id="timetable_note" class="timetable_note">Manual schedule stored locally in this app.</p>
            </div>
            </div>

            <div id="timetable_grid" class="timetable_grid" aria-label="Weekly timetable"></div>
            <div id="timetable_mobile" class="timetable_mobile" aria-label="Weekly timetable by day"></div>
        </div>
        </main>

        <button type="button" id="theme_toggle" class="theme_toggle" aria-label="Toggle theme">
            <svg class="theme_icon_sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="theme_icon_moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>

        <script src="script.js"></script>
    </body>
</html>
