# This is your optimized local configuration file
name: Local Ollama Config
version: 1.0.0
schema: v1

# Define your locally hosted models
models:
  - name: Qwen 2.5 Coder 3B (Chat)
    provider: ollama
    model: qwen2.5-coder:3b
    roles:
      - chat
      - edit
      - apply

# Set up your fast inline autocomplete model
autocompleteModels:
  - name: Qwen 1.5B (Autocomplete)
    provider: ollama
    model: qwen2.5-coder:1.5b
    roles:
      - autocomplete